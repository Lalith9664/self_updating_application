<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Updating App</title>
    <!-- Bootstrap 4.6 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- DevExtreme Theme (Dark) -->
    <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.2.3/css/dx.dark.css">

    <style>
        body {
            background-color: #1e1e2d;
            color: #fff;
            padding-top: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: #2b2b40;
            border-color: #3b3b54;
            border-radius: 12px;
        }

        .card-header {
            border-bottom: 1px solid #3b3b54;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 12px 12px 0 0 !important;
        }

        .spinner {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            border: 0.2em solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border .75s linear infinite;
        }

        .dx-list-item {
            background-color: transparent !important;
            color: #fff;
            border-bottom: 1px solid #3b3b54;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 700px;">
        <div class="text-center mb-4">
            <h1>🚀 Self Hii App</h1>
            <p class="text-muted">Built with DevExpress, Bootstrap 4.6 & Jinja2</p>
        </div>

        <div id="alertContainer"></div>

        <div class="card mb-4 shadow-lg">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Update Status</h5>
                <!-- Jinja2 injected version -->
                <span class="badge badge-info py-2 px-3" id="versionBadge" style="font-size: 14px;">v{{ version
                    }}</span>
            </div>
            <div class="card-body">
                <h4 id="statusDisplay" class="text-center mb-4 font-weight-light">Ready to check for updates</h4>

                <div id="progressBar"></div>

                <div id="modulesContainer" class="mt-4" style="display: none;">
                    <h6 class="text-secondary">📦 Available Modules:</h6>
                    <div id="modulesList" class="border border-secondary rounded"></div>
                </div>

                <div class="mt-4 text-center">
                    <button class="btn btn-sm btn-outline-secondary" type="button" data-toggle="collapse"
                        data-target="#statusContentWrapper">
                        Toggle Advanced Details
                    </button>
                    <div class="collapse mt-3 text-left" id="statusContentWrapper">
                        <div class="card card-body bg-dark border-secondary" id="statusContent"
                            style="max-height: 200px; overflow-y: auto;"></div>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex justify-content-between bg-transparent border-top-0 pb-4">
                <div id="checkBtn"></div>
                <div id="updateBtn"></div>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-header">
                <h5 class="mb-0">⚙️ Settings</h5>
            </div>
            <div class="card-body">
                <div class="row align-items-center mb-3">
                    <div class="col-md-8 text-light">🔄 Auto-Update</div>
                    <div class="col-md-4 text-right">
                        <div id="autoUpdateToggle"></div>
                    </div>
                </div>
                <div class="row align-items-center mb-3">
                    <div class="col-md-8 text-light">⏱️ Check Interval (seconds)</div>
                    <div class="col-md-4">
                        <div id="checkInterval"></div>
                    </div>
                </div>
                <div class="row align-items-center mb-3">
                    <div class="col-md-8 text-light">📦 Auto-Install Updates</div>
                    <div class="col-md-4 text-right">
                        <div id="autoInstallToggle"></div>
                    </div>
                </div>
                <div class="row align-items-center mb-3">
                    <div class="col-md-8 text-light">🔔 Show Notifications</div>
                    <div class="col-md-4 text-right">
                        <div id="notificationToggle"></div>
                    </div>
                </div>
                <div class="mt-4">
                    <div id="saveSettingsBtn" class="w-100"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (Required by DevExpress & Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!-- Bootstrap 4.6 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DevExtreme Library -->
    <script src="https://cdn3.devexpress.com/jslib/23.2.3/js/dx.all.js"></script>

    <script>
        // Store the Jinja2 injected version for hot-reloading checks
        let loadedVersion = "{{ version }}";

        let autoUpdateSettings = {
            enabled: true,
            checkIntervalSeconds: 30,
            autoInstall: true,
            showNotification: true
        };
        let autoCheckInterval = null;
        let lastAutoCheckTime = 0;

        // Initialize DevExtreme Components
        $(function () {
            // Settings Components
            const autoUpdateSwitch = $("#autoUpdateToggle").dxSwitch({
                value: autoUpdateSettings.enabled,
                onValueChanged: function (e) { autoUpdateSettings.enabled = e.value; }
            }).dxSwitch("instance");

            const autoInstallSwitch = $("#autoInstallToggle").dxSwitch({
                value: autoUpdateSettings.autoInstall,
                onValueChanged: function (e) { autoUpdateSettings.autoInstall = e.value; }
            }).dxSwitch("instance");

            const notificationSwitch = $("#notificationToggle").dxSwitch({
                value: autoUpdateSettings.showNotification,
                onValueChanged: function (e) { autoUpdateSettings.showNotification = e.value; }
            }).dxSwitch("instance");

            const intervalBox = $("#checkInterval").dxNumberBox({
                value: autoUpdateSettings.checkIntervalSeconds,
                min: 1, max: 60,
                showSpinButtons: true
            }).dxNumberBox("instance");

            $("#saveSettingsBtn").dxButton({
                text: "Save Settings",
                type: "success",
                width: "100%",
                onClick: saveSettings
            });

            // Action Buttons
            const checkBtn = $("#checkBtn").dxButton({
                text: "🔍 Check Updates",
                type: "default",
                onClick: checkUpdates
            }).dxButton("instance");

            const updateBtn = $("#updateBtn").dxButton({
                text: "⚡ Auto-Install",
                type: "danger",
                disabled: true,
                onClick: instantAutoInstall
            }).dxButton("instance");

            // Progress Bar
            const progressBar = $("#progressBar").dxProgressBar({
                min: 0, max: 100, value: 0,
                statusFormat: function () { return "Processing..."; },
                visible: false
            }).dxProgressBar("instance");

            // Module List
            const modulesList = $("#modulesList").dxList({
                items: [],
                height: "auto",
                noDataText: "No modules found"
            }).dxList("instance");

            // Load settings and start
            loadSettings();

            function showAlert(message, type) {
                const alertHtml = `<div class="alert alert-${type} alert-dismissible fade show shadow-sm" role="alert">
                    ${message}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>`;
                $("#alertContainer").html(alertHtml);
            }

            function loadSettings() {
                fetch('/settings')
                    .then(res => res.json())
                    .then(data => {
                        const settings = data.auto_update;
                        autoUpdateSettings = {
                            enabled: settings.enabled,
                            checkIntervalSeconds: settings.check_interval_seconds,
                            autoInstall: settings.auto_install,
                            showNotification: settings.show_notification
                        };

                        autoUpdateSwitch.option("value", settings.enabled);
                        autoInstallSwitch.option("value", settings.auto_install);
                        notificationSwitch.option("value", settings.show_notification);
                        intervalBox.option("value", settings.check_interval_seconds);

                        if (autoUpdateSettings.enabled) {
                            startAutoUpdate();
                        }
                    })
                    .catch(err => console.error('Failed to load settings:', err));
            }

            function saveSettings() {
                const settings = {
                    auto_update: {
                        enabled: autoUpdateSettings.enabled,
                        check_interval_seconds: intervalBox.option("value") || 30,
                        auto_install: autoUpdateSettings.autoInstall,
                        show_notification: autoUpdateSettings.showNotification
                    }
                };

                fetch('/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                })
                    .then(res => res.json())
                    .then(data => {
                        autoUpdateSettings.checkIntervalSeconds = settings.auto_update.check_interval_seconds;
                        showAlert('Settings saved successfully', 'success');
                        if (autoUpdateSettings.enabled) {
                            stopAutoUpdate();
                            startAutoUpdate();
                        } else {
                            stopAutoUpdate();
                        }
                    })
                    .catch(err => showAlert('Failed to save settings', 'danger'));
            }

            function startAutoUpdate() {
                if (autoCheckInterval) return;
                autoCheckForUpdates();
                autoCheckInterval = setInterval(autoCheckForUpdates, autoUpdateSettings.checkIntervalSeconds * 1000);
            }

            function stopAutoUpdate() {
                if (autoCheckInterval) {
                    clearInterval(autoCheckInterval);
                    autoCheckInterval = null;
                }
            }

            function autoCheckForUpdates() {
                const now = Date.now();
                if (now - lastAutoCheckTime < 1000) return;
                lastAutoCheckTime = now;

                fetch('/check')
                    .then(res => res.json())
                    .then(data => {
                        if (data.updates_available) {
                            if (autoUpdateSettings.showNotification) {
                                showAlert(`📦 Updates found! Installing: ${data.available_modules.join(', ')}`, 'info');
                            }
                            if (autoUpdateSettings.autoInstall) {
                                setTimeout(instantAutoInstall, 500);
                            }
                        }
                        displayStatus(data);
                        loadCurrentVersion();
                    });
            }

            function checkUpdates() {
                checkBtn.option("disabled", true);
                progressBar.option("visible", true);
                $("#statusDisplay").html('<span class="spinner"></span> Checking for updates...');

                fetch('/check')
                    .then(res => res.json())
                    .then(data => {
                        loadCurrentVersion();
                        if (data.updates_available) {
                            showAlert(`📦 Updates found!`, 'success');
                            displayStatus(data);
                        } else if (!data.error) {
                            displayStatus(data);
                            showAlert('✨ Your app is already up to date', 'success');
                        } else {
                            displayStatus(data);
                        }
                    })
                    .catch(error => {
                        showAlert('Failed to check updates: ' + error.message, 'danger');
                        $("#statusDisplay").text('Error checking updates');
                    })
                    .finally(() => {
                        checkBtn.option("disabled", false);
                        progressBar.option("visible", false);
                    });
            }

            function instantAutoInstall() {
                updateBtn.option("disabled", true);
                progressBar.option("visible", true);
                $("#statusDisplay").html('<span class="spinner"></span> Installing updates...');

                fetch('/update')
                    .then(res => res.json())
                    .then(data => {
                        displayUpdateResult(data);
                        loadCurrentVersion();
                        if (data.success) {
                            showAlert('✅ Updates installed instantly!', 'success');
                            setTimeout(() => window.location.reload(), 2000);
                        } else {
                            showAlert('Installation completed with errors', 'danger');
                        }
                    })
                    .catch(error => {
                        progressBar.option("visible", false);
                        $("#statusDisplay").text('Installation failed');
                        showAlert('Update failed: ' + error.message, 'danger');
                    });
            }

            function displayStatus(data) {
                if (data.error) {
                    $("#statusDisplay").html('❌ ' + data.error);
                    updateBtn.option("disabled", true);
                    return;
                }

                if (data.updates_available) {
                    $("#statusDisplay").html('📦 Updates available!');
                    updateBtn.option("disabled", false);
                } else {
                    $("#statusDisplay").html('✨ App is up to date');
                    updateBtn.option("disabled", true);
                }

                if (data.available_modules && data.available_modules.length > 0) {
                    modulesList.option("items", data.available_modules);
                    $("#modulesContainer").show();
                } else {
                    $("#modulesContainer").hide();
                }

                $("#statusContent").html('<pre class="text-info m-0" style="font-size: 12px;">' + JSON.stringify(data, null, 2) + '</pre>');
            }

            function displayUpdateResult(data) {
                progressBar.option("visible", false);

                if (data.success) {
                    $("#statusDisplay").html('✅ Update Complete!');
                } else {
                    $("#statusDisplay").html('⚠️ Update Completed with Errors');
                }

                let html = '<strong>Update Summary:</strong><br><br>';
                if (data.modules && data.modules.length > 0) {
                    data.modules.forEach(mod => {
                        html += `<div class="mb-2">${mod.name}: <span class="badge badge-${mod.status === 'success' ? 'success' : 'danger'}">${mod.status.toUpperCase()}</span></div>`;
                    });
                }

                $("#statusContent").html(html);
                if (!$("#statusContentWrapper").hasClass("show")) {
                    $("#statusContentWrapper").collapse("show");
                }

                updateBtn.option("disabled", true);
            }

            function loadCurrentVersion() {
                fetch('/version')
                    .then(res => res.json())
                    .then(data => {
                        if (data.current_version) {
                            $("#versionBadge").text("v" + data.current_version);

                            // Hot reload logic using Jinja2 rendered initial state
                            if (loadedVersion !== "" && loadedVersion !== data.current_version) {
                                console.log("Version changed locally, hot reloading...");
                                window.location.reload();
                            }
                        }
                    });
            }
        });
    </script>
</body>

</html>
